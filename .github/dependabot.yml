version: 2

updates:
  # npm/pnpm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 10
    groups:
      # Group non-breaking minor/patch updates to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major version bumps require manual review
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - dependencies
      - automated

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - automated
