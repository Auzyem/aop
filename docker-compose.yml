version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: aop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aop
      POSTGRES_PASSWORD: aop
      POSTGRES_DB: aop
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aop -d aop']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aop-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage for local dev)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: aop-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # MinIO bucket initialisation (runs once then exits)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: aop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/aop-documents &&
        echo 'Bucket aop-documents ready.'
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
